spring:
  application:
    name: API-Gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: identity-service
              uri: lb://identity-service
              predicates:
                - Path=/auth/**
            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/ai/**
            - id: request-service
              uri: lb://request-service
              predicates:
                - Path=/requests/**
            - id: room-service
              uri: lb://room-service
              predicates:
                - Path=/api/rooms/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: false
server:
  port: 1997
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true
